events {
    worker_connections 1024;
}

http {
    upstream book_service {
        server book-service:3001;
    }

    upstream loan_service {
        server loan-service:3002;
    }

    upstream user_service {
        server user-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Server configuration
    server {
        listen 80;
        server_name localhost;

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $http_x_trace_id;
        proxy_pass_header X-Trace-Id;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Gateway health check (served directly by Nginx)
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","service":"nginx","timestamp":"$date_gmt"}';
        }

        # ── Book Service ────────────────────────────────────────────────────
        # /api/books/health  → book-service /health
        location = /api/books/health {
            proxy_pass http://book_service/health;
        }
        # /api/books  → book-service /books  (list + create)
        location = /api/books {
            proxy_pass http://book_service/books;
        }
        # /api/books/…  → book-service /books/…  (get/update/delete by id)
        location /api/books/ {
            proxy_pass http://book_service/books/;
        }

        # ── Loan Service ─────────────────────────────────────────────────────
        location = /api/loans/health {
            proxy_pass http://loan_service/health;
        }
        location = /api/loans {
            proxy_pass http://loan_service/loans;
        }
        location /api/loans/ {
            proxy_pass http://loan_service/loans/;
        }

        # ── User Service ─────────────────────────────────────────────────────
        location = /api/users/health {
            proxy_pass http://user_service/health;
        }
        location = /api/users {
            proxy_pass http://user_service/users;
        }
        location /api/users/ {
            proxy_pass http://user_service/users/;
        }

        # ── Notification Service ─────────────────────────────────────────────
        location = /api/notifications/health {
            proxy_pass http://notification_service/health;
        }
        location = /api/notifications {
            proxy_pass http://notification_service/notifications;
        }
        location /api/notifications/ {
            proxy_pass http://notification_service/notifications/;
        }

        # Unknown /api/* routes → 404
        location /api/ {
            add_header Content-Type application/json always;
            return 404 '{"error":"Not Found","message":"The requested API endpoint does not exist"}';
        }

        # Root endpoint
        location / {
            add_header Content-Type application/json;
            return 200 '{"message":"Library Microservices API Gateway","version":"1.0.0","endpoints":{"/api/books":"Book management","/api/loans":"Loan management","/api/users":"User management","/api/notifications":"Notification service","/health":"Health check"}}';
        }
    }
}
