events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Server configuration
    server {
        listen 80;
        server_name localhost;

        # Docker's internal DNS — forces re-resolution on every request
        # so nginx never caches stale container IPs after restarts
        resolver 127.0.0.11 valid=10s ipv6=off;
        resolver_timeout 5s;

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $http_x_trace_id;
        proxy_pass_header X-Trace-Id;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Gateway health check (served directly by Nginx)
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","service":"nginx","timestamp":"$date_gmt"}';
        }

        # ── Book Service ────────────────────────────────────────────────────
        location = /api/books/health {
            set $upstream_book http://book-service:3001;
            proxy_pass $upstream_book/health;
        }
        location = /api/books {
            set $upstream_book http://book-service:3001;
            proxy_pass $upstream_book/books$is_args$args;
        }
        location /api/books/ {
            set $upstream_book http://book-service:3001;
            rewrite ^/api/books/(.*)$ /books/$1 break;
            proxy_pass $upstream_book;
        }

        # ── Loan Service ─────────────────────────────────────────────────────
        location = /api/loans/health {
            set $upstream_loan http://loan-service:3002;
            proxy_pass $upstream_loan/health;
        }
        location = /api/loans {
            set $upstream_loan http://loan-service:3002;
            proxy_pass $upstream_loan/loans$is_args$args;
        }
        location /api/loans/ {
            set $upstream_loan http://loan-service:3002;
            rewrite ^/api/loans/(.*)$ /loans/$1 break;
            proxy_pass $upstream_loan;
        }

        # ── User Service ─────────────────────────────────────────────────────
        location = /api/users/health {
            set $upstream_user http://user-service:3003;
            proxy_pass $upstream_user/health;
        }
        location = /api/users {
            set $upstream_user http://user-service:3003;
            proxy_pass $upstream_user/users$is_args$args;
        }
        location /api/users/ {
            set $upstream_user http://user-service:3003;
            rewrite ^/api/users/(.*)$ /users/$1 break;
            proxy_pass $upstream_user;
        }

        # ── Notification Service ─────────────────────────────────────────────
        location = /api/notifications/health {
            set $upstream_notif http://notification-service:3004;
            proxy_pass $upstream_notif/health;
        }
        location = /api/notifications {
            set $upstream_notif http://notification-service:3004;
            proxy_pass $upstream_notif/notifications$is_args$args;
        }
        location /api/notifications/ {
            set $upstream_notif http://notification-service:3004;
            rewrite ^/api/notifications/(.*)$ /notifications/$1 break;
            proxy_pass $upstream_notif;
        }

        # Unknown /api/* routes → 404
        location /api/ {
            add_header Content-Type application/json always;
            return 404 '{"error":"Not Found","message":"The requested API endpoint does not exist"}';
        }

        # Root endpoint
        location / {
            add_header Content-Type application/json;
            return 200 '{"message":"Library Microservices API Gateway","version":"1.0.0","endpoints":{"/api/books":"Book management","/api/loans":"Loan management","/api/users":"User management","/api/notifications":"Notification service","/health":"Health check"}}';
        }
    }
}
