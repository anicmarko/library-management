events {
    worker_connections 1024;
}

http {
    upstream book_service {
        server book-service:3001;
    }

    upstream loan_service {
        server loan-service:3002;
    }

    upstream user_service {
        server user-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Server configuration
    server {
        listen 80;
        server_name localhost;

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Book Service
        location /api/books {
            proxy_pass http://book_service;
        }

        # Loan Service
        location /api/loans {
            proxy_pass http://loan_service;
        }

        # User Service
        location /api/users {
            proxy_pass http://user_service;
        }

        # Notification Service
        location /api/notifications {
            proxy_pass http://notification_service;
        }

        # Health check endpoint - aggregate health status
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","services":{"nginx":"up","book-service":"pending","loan-service":"pending","user-service":"pending","notification-service":"pending"},"timestamp":"$date_gmt"}';
        }

        # Root endpoint
        location / {
            add_header Content-Type application/json;
            return 200 '{"message":"Library Microservices API Gateway","version":"1.0.0","endpoints":{"/api/books":"Book management","/api/loans":"Loan management","/api/users":"User management","/api/notifications":"Notification service","/health":"Health check"}}';
        }

        # Handle 404
        location @404 {
            add_header Content-Type application/json;
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
        }

        error_page 404 = @404;
    }
}
