name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-status-check:
    name: Check CI conclusion
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - run: echo "CI passed for ${{ github.event.workflow_run.head_sha }} — proceeding with CD"

  load-outputs:
    name: Load CI Change Detection Outputs
    needs: [ci-status-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      book-service: ${{ steps.parse.outputs.book-service }}
      loan-service: ${{ steps.parse.outputs.loan-service }}
      user-service: ${{ steps.parse.outputs.user-service }}
      notification-service: ${{ steps.parse.outputs.notification-service }}
      shared: ${{ steps.parse.outputs.shared }}
      ci: ${{ steps.parse.outputs.ci }}
      has-changes: ${{ steps.parse.outputs.has-changes }}
      build-all: ${{ steps.parse.outputs.build-all }}
      is-new-branch: ${{ steps.parse.outputs.is-new-branch }}
    steps:
      - name: Download change detection outputs from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-changes-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Parse outputs
        id: parse
        run: |
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < detect-changes.env

  sync-compose-files:
    name: Sync Compose Files to VM
    needs: [load-outputs]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    if: needs.load-outputs.outputs.has-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy compose files to VM
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,docker-compose.prod.yml,nginx.conf"
          target: "~/app"
          overwrite: true

  deploy:
    name: Deploy (${{ matrix.service }})
    needs: [load-outputs, sync-compose-files]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: needs.load-outputs.outputs.has-changes == 'true'
    strategy:
      matrix:
        service: [book-service, loan-service, user-service, notification-service]
      fail-fast: false
      max-parallel: 1
    steps:
      - name: Check if service should deploy
        id: check_service
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          BUILD_ALL: ${{ needs.load-outputs.outputs.build-all }}
          IS_NEW_BRANCH: ${{ needs.load-outputs.outputs.is-new-branch }}
          CI_CHANGED: ${{ needs.load-outputs.outputs.ci }}
          SHARED: ${{ needs.load-outputs.outputs.shared }}
          CHG_BOOK: ${{ needs.load-outputs.outputs.book-service }}
          CHG_LOAN: ${{ needs.load-outputs.outputs.loan-service }}
          CHG_USER: ${{ needs.load-outputs.outputs.user-service }}
          CHG_NOTIF: ${{ needs.load-outputs.outputs.notification-service }}
        run: |
          case "$MATRIX_SERVICE" in
            book-service)         CHANGED="$CHG_BOOK" ;;
            loan-service)         CHANGED="$CHG_LOAN" ;;
            user-service)         CHANGED="$CHG_USER" ;;
            notification-service) CHANGED="$CHG_NOTIF" ;;
          esac

          if [ "$IS_NEW_BRANCH" == "true" ] || [ "$BUILD_ALL" == "true" ] || \
             [ "$CI_CHANGED" == "true" ] || [ "$SHARED" == "true" ] || [ "$CHANGED" == "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ $MATRIX_SERVICE - deploying"
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  $MATRIX_SERVICE not changed - skipping deploy"
          fi

      # Secrets with special characters will break an inline SSH script.
      # Instead, we write an env file on the runner and SCP it to the VM
      # before the SSH step — no heredoc, no interpolation issues.
      - name: Write .env file on runner
        if: steps.check_service.outputs.deploy == 'true'
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        run: |
          cat > /tmp/app.env <<EOF
          NODE_ENV=production
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          MONGODB_URI=${MONGODB_URI}
          DATABASE_URL=${DATABASE_URL}
          ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}
          LOG_LEVEL=${LOG_LEVEL}
          EOF
          chmod 600 /tmp/app.env

      - name: Copy .env to VM
        if: steps.check_service.outputs.deploy == 'true'
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/tmp/app.env"
          target: "~/app"
          overwrite: true
          strip_components: 2  # drops /tmp/ prefix, lands as ~/app/app.env

      - name: Deploy via SSH
        if: steps.check_service.outputs.deploy == 'true'
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          SERVICE: ${{ matrix.service }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ACR_LOGIN_SERVER,ACR_USERNAME,ACR_PASSWORD,SERVICE
          script: |
            set -e

            echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin

            cd ~/app

            # Atomically replace .env so no service reads a half-written file
            mv app.env .env

            docker compose -f docker-compose.yaml -f docker-compose.prod.yml pull "$SERVICE"
            docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d --no-deps --remove-orphans "$SERVICE"

            # Health check — wait up to 60s
            CONTAINER=$(docker compose -f docker-compose.yaml -f docker-compose.prod.yml ps -q "$SERVICE" | head -1)
            echo "Waiting for $SERVICE to stabilise..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Status}}' "$CONTAINER" 2>/dev/null || echo "missing")
              HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CONTAINER" 2>/dev/null || echo "missing")
              if [ "$STATUS" == "running" ] && { [ "$HEALTH" == "healthy" ] || [ "$HEALTH" == "none" ]; }; then
                echo "✅ $SERVICE is up (status=$STATUS, health=$HEALTH)"
                exit 0
              fi
              echo "[$((i*5))s] status=$STATUS health=$HEALTH — waiting..."
              sleep 5
            done

            echo "❌ $SERVICE did not become healthy in 60s"
            docker compose -f docker-compose.yaml -f docker-compose.prod.yml logs --tail=50 "$SERVICE"
            exit 1