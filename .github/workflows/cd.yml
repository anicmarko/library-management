name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  load-outputs:
    name: Load CI Change Detection Outputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    outputs:
      book-service: ${{ steps.parse.outputs.book-service }}
      loan-service: ${{ steps.parse.outputs.loan-service }}
      user-service: ${{ steps.parse.outputs.user-service }}
      notification-service: ${{ steps.parse.outputs.notification-service }}
      shared: ${{ steps.parse.outputs.shared }}
      ci: ${{ steps.parse.outputs.ci }}
      has-changes: ${{ steps.parse.outputs.has-changes }}
      build-all: ${{ steps.parse.outputs.build-all }}
      is-new-branch: ${{ steps.parse.outputs.is-new-branch }}
    steps:
      - name: Download change detection outputs from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-changes-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Parse outputs
        id: parse
        run: |
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < detect-changes.env

  deploy:
    name: Deploy all services
    needs: [load-outputs]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.load-outputs.outputs.has-changes == 'true'
    steps:
      - name: Download compose files from CI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-changes-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Write .env file
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        run: |
          printf 'NODE_ENV=production\nPOSTGRES_PASSWORD=%s\nMYSQL_ROOT_PASSWORD=%s\nMYSQL_PASSWORD=%s\nMONGO_ROOT_PASSWORD=%s\nMONGODB_URI=%s\nDATABASE_URL=%s\nACR_LOGIN_SERVER=%s\nLOG_LEVEL=%s\n' \
            "$POSTGRES_PASSWORD" "$MYSQL_ROOT_PASSWORD" "$MYSQL_PASSWORD" \
            "$MONGO_ROOT_PASSWORD" "$MONGODB_URI" "$DATABASE_URL" \
            "$ACR_LOGIN_SERVER" "$LOG_LEVEL" > .env
          chmod 600 .env

      - name: Copy files to VM and deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          BUILD_ALL: ${{ needs.load-outputs.outputs.build-all }}
          IS_NEW_BRANCH: ${{ needs.load-outputs.outputs.is-new-branch }}
          CI_CHANGED: ${{ needs.load-outputs.outputs.ci }}
          CHG_BOOK: ${{ needs.load-outputs.outputs.book-service }}
          CHG_LOAN: ${{ needs.load-outputs.outputs.loan-service }}
          CHG_USER: ${{ needs.load-outputs.outputs.user-service }}
          CHG_NOTIF: ${{ needs.load-outputs.outputs.notification-service }}
        run: |
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          HOST="${VM_HOST//$'\n'/}"

          tar -czf - docker-compose.yaml docker-compose.prod.yml nginx.conf .env monitoring/ mysql/ | \
            ssh -i "$KEY_FILE" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              "${VM_USER}@${HOST}" 'mkdir -p ~/app && tar -xzf - -C ~/app --overwrite --no-same-owner'

          # Build selective pull list — only pull images that actually changed
          SERVICES=""
          if [ "$BUILD_ALL" != "true" ] && [ "$IS_NEW_BRANCH" != "true" ] && [ "$CI_CHANGED" != "true" ]; then
            [ "$CHG_BOOK" == "true" ]  && SERVICES="$SERVICES book-service"
            [ "$CHG_LOAN" == "true" ]  && SERVICES="$SERVICES loan-service"
            [ "$CHG_USER" == "true" ]  && SERVICES="$SERVICES user-service"
            [ "$CHG_NOTIF" == "true" ] && SERVICES="$SERVICES notification-service"
            SERVICES="${SERVICES# }"  # trim leading space
          fi

          ssh -i "$KEY_FILE" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=10 \
            "${VM_USER}@${HOST}" bash -s << REMOTE
            set -e
            echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin
            cd ~/app
            docker compose -f docker-compose.yaml -f docker-compose.prod.yml pull $SERVICES
            docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete"
          REMOTE