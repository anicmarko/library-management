name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-status-check:
    name: Check CI conclusion
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - run: echo "CI passed for ${{ github.event.workflow_run.head_sha }} — proceeding with CD"

  load-outputs:
    name: Load CI Change Detection Outputs
    needs: [ci-status-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      book-service: ${{ steps.parse.outputs.book-service }}
      loan-service: ${{ steps.parse.outputs.loan-service }}
      user-service: ${{ steps.parse.outputs.user-service }}
      notification-service: ${{ steps.parse.outputs.notification-service }}
      shared: ${{ steps.parse.outputs.shared }}
      ci: ${{ steps.parse.outputs.ci }}
      has-changes: ${{ steps.parse.outputs.has-changes }}
      build-all: ${{ steps.parse.outputs.build-all }}
      is-new-branch: ${{ steps.parse.outputs.is-new-branch }}
    steps:
      - name: Download change detection outputs from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-changes-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Parse outputs
        id: parse
        run: |
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < detect-changes.env

  sync-compose-files:
    name: Sync Compose Files to VM
    needs: [load-outputs]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    if: needs.load-outputs.outputs.has-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy compose files to VM
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          HOST="${VM_HOST//$'\n'/}"
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=no \
            docker-compose.yaml docker-compose.prod.yml nginx.conf \
            "${VM_USER}@${HOST}:~/app/"

  deploy:
    name: Deploy all services
    needs: [load-outputs, sync-compose-files]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.load-outputs.outputs.has-changes == 'true'
    steps:
      - name: Write .env file on runner
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        run: |
          printf 'NODE_ENV=production\nPOSTGRES_PASSWORD=%s\nMYSQL_ROOT_PASSWORD=%s\nMYSQL_PASSWORD=%s\nMONGO_ROOT_PASSWORD=%s\nMONGODB_URI=%s\nDATABASE_URL=%s\nACR_LOGIN_SERVER=%s\nLOG_LEVEL=%s\n' \
            "$POSTGRES_PASSWORD" "$MYSQL_ROOT_PASSWORD" "$MYSQL_PASSWORD" \
            "$MONGO_ROOT_PASSWORD" "$MONGODB_URI" "$DATABASE_URL" \
            "$ACR_LOGIN_SERVER" "$LOG_LEVEL" > /tmp/app.env
          chmod 600 /tmp/app.env

      - name: Copy .env to VM
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          HOST="${VM_HOST//$'\n'/}"
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=no \
            /tmp/app.env "${VM_USER}@${HOST}:~/app/.env"

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          HOST="${VM_HOST//$'\n'/}"

          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "${VM_USER}@${HOST}" << REMOTE
            set -e
            echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin
            cd ~/app
            docker compose -f docker-compose.yaml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete"
          REMOTE