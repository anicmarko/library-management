name: CI Pipeline
# last updated: 2026-03-03

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# Default to minimal read-only permissions; jobs that need more declare their own permissions block
permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      book-service: ${{ steps.filter.outputs.book-service }}
      loan-service: ${{ steps.filter.outputs.loan-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
      has-changes: ${{ steps.set-flag.outputs.has-changes }}
      build-all: ${{ steps.set-build-all.outputs.build-all }}
      is-new-branch: ${{ steps.set-flag.outputs.is-new-branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute base ref
        id: base-ref
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
          GH_BEFORE: ${{ github.event.before }}
        run: |
          if [ "$GH_EVENT_NAME" == "pull_request" ]; then
            BASE="$GH_BASE_REF"
          elif [ "$GH_BEFORE" == "0000000000000000000000000000000000000000" ]; then
            BASE="dev"
          else
            BASE="$GH_BEFORE"
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT

      # Merged root config + service + CI filters into a single paths-filter step
      - name: Check for path changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          base: ${{ steps.base-ref.outputs.base }}
          filters: |
            root:
              - 'package.json'
              - 'package-lock.json'
              - '.eslintrc.json'
              - '.prettierrc.json'
              - 'jest.config.js'
              - 'tsconfig.json'
            book-service:
              - 'services/book-service/**'
            loan-service:
              - 'services/loan-service/**'
            user-service:
              - 'services/user-service/**'
            notification-service:
              - 'services/notification-service/**'
            shared:
              - 'services/shared/**'
            ci:
              - '.github/**'
              - '**/Dockerfile'
              - 'docker-compose*.y*ml'
              - 'nginx.conf'

      - name: Set build-all flag
        id: set-build-all
        env:
          FILTER_ROOT: ${{ steps.filter.outputs.root }}
        run: |
          # Only trigger build-all when shared root config files change
          if [ "$FILTER_ROOT" == "true" ]; then
            echo "build-all=true" >> $GITHUB_OUTPUT
            echo "🔄 Root config changed - building all services"
          else
            echo "build-all=false" >> $GITHUB_OUTPUT
          fi

      - name: Set has-changes flag
        id: set-flag
        env:
          GH_BEFORE: ${{ github.event.before }}
          BUILD_ALL: ${{ steps.set-build-all.outputs.build-all }}
          BOOK: ${{ steps.filter.outputs.book-service }}
          LOAN: ${{ steps.filter.outputs.loan-service }}
          USER: ${{ steps.filter.outputs.user-service }}
          NOTIF: ${{ steps.filter.outputs.notification-service }}
          SHARED: ${{ steps.filter.outputs.shared }}
          CI_CHANGED: ${{ steps.filter.outputs.ci }}
        run: |
          IS_NEW_BRANCH=false
          if [ "$GH_BEFORE" == "0000000000000000000000000000000000000000" ]; then
            IS_NEW_BRANCH=true
            echo "🆕 New branch detected - running all services"
          fi
          echo "is-new-branch=$IS_NEW_BRANCH" >> $GITHUB_OUTPUT

          if [ "$IS_NEW_BRANCH" == "true" ] || \
             [ "$BUILD_ALL" == "true" ] || \
             [ "$BOOK" == "true" ] || \
             [ "$LOAN" == "true" ] || \
             [ "$USER" == "true" ] || \
             [ "$NOTIF" == "true" ] || \
             [ "$SHARED" == "true" ] || \
             [ "$CI_CHANGED" == "true" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint Code
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.detect-changes.outputs.has-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    needs: [lint, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.detect-changes.outputs.has-changes == 'true'
    permissions:
      checks: write
      contents: read
      pull-requests: write
      actions: read
    strategy:
      matrix:
        service: [book-service, loan-service, user-service, notification-service]
      fail-fast: false # allow other matrix jobs to finish even if one fails
    steps:
      - name: Check if service changed
        id: check_service
        env:
          GH_REF: ${{ github.ref }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
          MATRIX_SERVICE: ${{ matrix.service }}
          BUILD_ALL: ${{ needs.detect-changes.outputs.build-all }}
          IS_NEW_BRANCH: ${{ needs.detect-changes.outputs.is-new-branch }}
          CHG_BOOK: ${{ needs.detect-changes.outputs.book-service }}
          CHG_LOAN: ${{ needs.detect-changes.outputs.loan-service }}
          CHG_USER: ${{ needs.detect-changes.outputs.user-service }}
          CHG_NOTIF: ${{ needs.detect-changes.outputs.notification-service }}
          CI_CHANGED: ${{ needs.detect-changes.outputs.ci }}
          SHARED: ${{ needs.detect-changes.outputs.shared }}
        run: |
          # Map matrix.service to its individual detect-changes output
          case "$MATRIX_SERVICE" in
            book-service)         CHANGED="$CHG_BOOK" ;;
            loan-service)         CHANGED="$CHG_LOAN" ;;
            user-service)         CHANGED="$CHG_USER" ;;
            notification-service) CHANGED="$CHG_NOTIF" ;;
          esac

          # shared change triggers all services to re-test
          IS_DEV_OR_MAIN=false
          case "$GH_REF" in
            refs/heads/dev|refs/heads/main) IS_DEV_OR_MAIN=true ;;
          esac
          if [ "$GH_EVENT_NAME" == "pull_request" ]; then
            case "$GH_BASE_REF" in
              dev|main) IS_DEV_OR_MAIN=true ;;
            esac
          fi

          if [ "$IS_NEW_BRANCH" == "true" ] || [ "$BUILD_ALL" == "true" ] || \
             [ "$CI_CHANGED" == "true" ] || [ "$CHANGED" == "true" ] || \
             [ "$SHARED" == "true" ] || \
             [ "$IS_DEV_OR_MAIN" == "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "✅ $MATRIX_SERVICE - running tests"
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "⏭️  $MATRIX_SERVICE not changed - skipping"
          fi

      - name: Checkout code
        if: steps.check_service.outputs.run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        if: steps.check_service.outputs.run == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check_service.outputs.run == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests with coverage
        if: steps.check_service.outputs.run == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm test

      - name: Publish Test Results
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        if: always() && steps.check_service.outputs.run == 'true'
        with:
          name: Unit Test Results (${{ matrix.service }})
          path: 'services/${{ matrix.service }}/test-results/*.xml'
          reporter: jest-junit
          fail-on-error: false

      - name: Archive coverage results
        if: always() && steps.check_service.outputs.run == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  build:
    name: Build Docker Images
    needs: [unit-tests, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      (github.ref == 'refs/heads/main' ||
       (github.event_name == 'pull_request' && github.base_ref == 'main'))
    strategy:
      matrix:
        service: [book-service, loan-service, user-service, notification-service]
      fail-fast: false # allow other matrix jobs to finish even if one fails
    steps:
      - name: Check if service should build
        id: check_service
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          BUILD_ALL: ${{ needs.detect-changes.outputs.build-all }}
          SHARED: ${{ needs.detect-changes.outputs.shared }}
          CHG_BOOK: ${{ needs.detect-changes.outputs.book-service }}
          CHG_LOAN: ${{ needs.detect-changes.outputs.loan-service }}
          CHG_USER: ${{ needs.detect-changes.outputs.user-service }}
          CHG_NOTIF: ${{ needs.detect-changes.outputs.notification-service }}
        run: |
          case "$MATRIX_SERVICE" in
            book-service)         CHANGED="$CHG_BOOK" ;;
            loan-service)         CHANGED="$CHG_LOAN" ;;
            user-service)         CHANGED="$CHG_USER" ;;
            notification-service) CHANGED="$CHG_NOTIF" ;;
          esac

          if [ "$BUILD_ALL" == "true" ] || [ "$SHARED" == "true" ] || [ "$CHANGED" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ $MATRIX_SERVICE - building"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  $MATRIX_SERVICE not changed - skipping"
          fi

      - name: Checkout code
        if: steps.check_service.outputs.changed == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        if: steps.check_service.outputs.changed == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        if: steps.check_service.outputs.changed == 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./services/${{ matrix.service }}
          # Validation only — image is not published.
          # Add registry login + push: true when ready to deploy.
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-tests:
    name: End-to-End Tests
    needs: [unit-tests, detect-changes]
    timeout-minutes: 30
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/dev' ||
       (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Check if docker-compose exists
        id: check_compose
        run: |
          if [ -f "docker-compose.yaml" ] || [ -f "docker-compose.yml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Found docker-compose file"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  docker-compose file not found - skipping E2E tests"
          fi

      # Install root devDependencies (e.g. the e2e test runner) needed for `npm run test:e2e`
      - name: Install dependencies
        if: steps.check_compose.outputs.exists == 'true'
        run: npm ci

      - name: Start services
        if: steps.check_compose.outputs.exists == 'true'
        run: docker compose up -d

      - name: Wait for services to be healthy
        if: steps.check_compose.outputs.exists == 'true'
        run: |
          echo "Waiting for all services to be ready..."
          TOTAL_SERVICES=$(docker compose config --services | wc -l)
          timeout=180
          elapsed=0

          until [ $elapsed -ge $timeout ]; do
            # Count containers that are healthy OR running with no healthcheck defined
            HEALTHY=$(docker compose ps --format json 2>/dev/null \
              | grep -c '"Health":"healthy"' || true)
            RUNNING_NO_HC=$(docker compose ps --format json 2>/dev/null \
              | grep -c '"Health":""' || true)
            READY=$((HEALTHY + RUNNING_NO_HC))
            echo "[$elapsed/${timeout}s] $READY/$TOTAL_SERVICES ready (healthy: $HEALTHY, no-hc: $RUNNING_NO_HC)"
            if [ "$READY" -ge "$TOTAL_SERVICES" ]; then
              echo "✅ All $TOTAL_SERVICES services are ready"
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "⚠️  Services did not become healthy in ${timeout}s"
            docker compose ps
            docker compose logs
            exit 1
          fi

      - name: Run E2E tests
        if: steps.check_compose.outputs.exists == 'true'
        run: npm run test:e2e

      - name: Show service logs on failure
        if: failure() && steps.check_compose.outputs.exists == 'true'
        run: docker compose logs

      - name: Stop services
        if: always() && steps.check_compose.outputs.exists == 'true'
        run: docker compose down -v

      - name: Archive E2E test results
        if: always() && steps.check_compose.outputs.exists == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-test-results
          path: test-results/
        continue-on-error: true

  sonarcloud:
    name: SonarCloud Analysis
    needs: [unit-tests, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name == 'pull_request' || 
       github.ref == 'refs/heads/main' || 
       github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-report-*
          path: coverage/
        continue-on-error: true

      - name: Prefix lcov SF paths with service directory
        run: |
          for lcov in coverage/coverage-report-*/lcov.info; do
            [ -f "$lcov" ] || continue
            service=$(echo "$lcov" | sed 's|coverage/coverage-report-\(.*\)/lcov.info|\1|')
            # Dry-run echo to verify path substitution in logs before applying
            echo "Prefixing SF paths in $lcov → services/$service/"
            sed -i "s|^SF:|SF:services/$service/|g" "$lcov"
          done

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=anicmarko_library-management
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.javascript.lcov.reportPaths=coverage/**/lcov.info
        continue-on-error: true