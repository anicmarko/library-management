name: CI Pipeline
# last updated: 2026-03-03

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - '.gitignore'

env:
  NODE_VERSION: '20'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      book-service: ${{ steps.filter.outputs.book-service }}
      loan-service: ${{ steps.filter.outputs.loan-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      has-changes: ${{ steps.set-flag.outputs.has-changes }}
      build-all: ${{ steps.set-build-all.outputs.build-all }}
      is-new-branch: ${{ steps.set-flag.outputs.is-new-branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for root config changes
        id: check-root
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.base_ref || (github.event.before == '0000000000000000000000000000000000000000' && 'dev' || github.event.before) }}
          filters: |
            root:
              - 'package.json'
              - 'package-lock.json'
              - '.eslintrc.json'
              - '.prettierrc.json'
              - 'jest.config.js'
              - 'tsconfig.json'

      - name: Set build-all flag
        id: set-build-all
        run: |
          # Only trigger build-all when shared root config files change
          if [ "${{ steps.check-root.outputs.root }}" == "true" ]; then
            echo "build-all=true" >> $GITHUB_OUTPUT
            echo "🔄 Root config changed - building all services"
          else
            echo "build-all=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for service changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event_name == 'pull_request' && github.base_ref || (github.event.before == '0000000000000000000000000000000000000000' && 'dev' || github.event.before) }}
          filters: |
            book-service:
              - 'services/book-service/**'
            loan-service:
              - 'services/loan-service/**'
            user-service:
              - 'services/user-service/**'
            notification-service:
              - 'services/notification-service/**'

      - name: Set has-changes flag
        id: set-flag
        run: |
          IS_NEW_BRANCH=false
          if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
            IS_NEW_BRANCH=true
            echo "🆕 New branch detected - running all services"
          fi
          echo "is-new-branch=$IS_NEW_BRANCH" >> $GITHUB_OUTPUT

          BUILD_ALL="${{ steps.set-build-all.outputs.build-all }}"
          BOOK="${{ steps.filter.outputs.book-service }}"
          LOAN="${{ steps.filter.outputs.loan-service }}"
          USER="${{ steps.filter.outputs.user-service }}"
          NOTIF="${{ steps.filter.outputs.notification-service }}"

          if [ "$IS_NEW_BRANCH" == "true" ] || \
             [ "$BUILD_ALL" == "true" ] || \
             [ "$BOOK" == "true" ] || \
             [ "$LOAN" == "true" ] || \
             [ "$USER" == "true" ] || \
             [ "$NOTIF" == "true" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    needs: [lint, detect-changes]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.has-changes == 'true'
    permissions:
      checks: write
      contents: read
    strategy:
      matrix:
        service: [book-service, loan-service, user-service, notification-service]
      fail-fast: false
    steps:
      - name: Check if service changed
        id: check_service
        run: |
          BUILD_ALL="${{ needs.detect-changes.outputs.build-all }}"
          IS_NEW_BRANCH="${{ needs.detect-changes.outputs.is-new-branch }}"

          # Map matrix.service to its individual detect-changes output
          case "${{ matrix.service }}" in
            book-service)         CHANGED="${{ needs.detect-changes.outputs.book-service }}" ;;
            loan-service)         CHANGED="${{ needs.detect-changes.outputs.loan-service }}" ;;
            user-service)         CHANGED="${{ needs.detect-changes.outputs.user-service }}" ;;
            notification-service) CHANGED="${{ needs.detect-changes.outputs.notification-service }}" ;;
          esac

          if [ "$IS_NEW_BRANCH" == "true" ] || [ "$BUILD_ALL" == "true" ] || [ "$CHANGED" == "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "✅ ${{ matrix.service }} - running tests"
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "⏭️  ${{ matrix.service }} not changed - skipping"
          fi

      - name: Checkout code
        if: steps.check_service.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check_service.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check_service.outputs.run == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests with coverage
        if: steps.check_service.outputs.run == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm test

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always() && steps.check_service.outputs.run == 'true'
        with:
          name: Unit Test Results (${{ matrix.service }})
          path: 'services/${{ matrix.service }}/test-results/*.xml'
          reporter: jest-junit
          fail-on-error: false

      - name: Upload coverage to Codecov
        if: steps.check_service.outputs.run == 'true'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: services/${{ matrix.service }}/coverage/lcov.info
          flags: ${{ matrix.service }}
          name: codecov-${{ matrix.service }}
        continue-on-error: true

      - name: Archive coverage results
        if: always() && steps.check_service.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  build:
    name: Build Docker Images
    needs: [unit-tests, detect-changes]
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      (github.ref == 'refs/heads/main' ||
       (github.event_name == 'pull_request' && github.base_ref == 'main'))
    strategy:
      matrix:
        service: [book-service, loan-service, user-service, notification-service]
      fail-fast: false
    steps:
      - name: Check if service should build
        id: check_service
        run: |
          BUILD_ALL="${{ needs.detect-changes.outputs.build-all }}"
          IS_NEW_BRANCH="${{ needs.detect-changes.outputs.is-new-branch }}"

          case "${{ matrix.service }}" in
            book-service)         CHANGED="${{ needs.detect-changes.outputs.book-service }}" ;;
            loan-service)         CHANGED="${{ needs.detect-changes.outputs.loan-service }}" ;;
            user-service)         CHANGED="${{ needs.detect-changes.outputs.user-service }}" ;;
            notification-service) CHANGED="${{ needs.detect-changes.outputs.notification-service }}" ;;
          esac

          if [ "$IS_NEW_BRANCH" == "true" ] || [ "$BUILD_ALL" == "true" ] || [ "$CHANGED" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ ${{ matrix.service }} - building"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  ${{ matrix.service }} not changed - skipping"
          fi

      - name: Checkout code
        if: steps.check_service.outputs.changed == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.check_service.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check_service.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-tests:
    name: End-to-End Tests
    needs: [unit-tests, detect-changes]
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      (github.ref == 'refs/heads/main' ||
       (github.event_name == 'pull_request' && github.base_ref == 'main'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Check if docker-compose exists
        id: check_compose
        run: |
          if [ -f "docker-compose.yaml" ] || [ -f "docker-compose.yml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Found docker-compose file"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  docker-compose file not found - skipping E2E tests"
          fi

      - name: Install dependencies
        if: steps.check_compose.outputs.exists == 'true'
        run: npm ci

      - name: Start services
        if: steps.check_compose.outputs.exists == 'true'
        run: docker compose up -d

      - name: Wait for services to be healthy
        if: steps.check_compose.outputs.exists == 'true'
        run: |
          echo "Waiting for services to be ready..."
          timeout=120
          elapsed=0

          until docker compose ps | grep -q "Up (healthy)" || [ $elapsed -ge $timeout ]; do
            echo "Waiting for services... ($elapsed/$timeout seconds)"
            sleep 5
            elapsed=$((elapsed + 5))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "⚠️  Services did not become healthy in time"
            docker compose ps
            docker compose logs
          else
            echo "✅ Services are healthy"
          fi

      - name: Run E2E tests
        if: steps.check_compose.outputs.exists == 'true'
        run: npm run test:e2e

      - name: Show service logs on failure
        if: failure() && steps.check_compose.outputs.exists == 'true'
        run: docker compose logs

      - name: Stop services
        if: always() && steps.check_compose.outputs.exists == 'true'
        run: docker compose down -v

      - name: Archive E2E test results
        if: always() && steps.check_compose.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
        continue-on-error: true

  sonarcloud:
    name: SonarCloud Analysis
    needs: [unit-tests, detect-changes]
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      (github.event_name == 'pull_request' || 
       github.ref == 'refs/heads/main' || 
       github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-report-*
          merge-multiple: true
          path: coverage/
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=library-microservices
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.javascript.lcov.reportPaths=coverage/**/lcov.info
        continue-on-error: true